<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="selectfriendbody">
    <nav class="All-pages-nav">
        <img class="Settings" src=".../Images/Settings-icon.png" alt="Settings Icon">
        <img class="Volume" src=".../Images/Volume.png" alt="Volume Icon">
    </nav>

    <main class="selectfriendmain">
        <h1>SELECT YOUR FRIEND</h1>
        <section class="friendsection">
            <section class="anderdingus">
                <div class="name">
                    <p><strong>Name:</strong> Anderdingus</p>
                </div>
                <img id="anderdingus-image" src=".../Images/anderdingus.png">
                <div class="description">
                    <p><strong>Description:</strong> Shy, scaredy cat, fun to hang around with</p>
                </div>

                <div class="pick" id="pick-anderdingus">
                    <p>Pick</p>
                </div>
            </section>

            <section class="justin">
                <div class="name">
                    <p><strong>Name:</strong> Justin Buttlord</p>
                </div>
                <img id="justin-image" src="Images/justinbuttlord.png">
                <div class="description">
                    <p><strong>Description:</strong> Brave ,courageous, strong, adventurous, positive</p>
                </div>

                <div class="pick" id="pick-justin">
                    <p>Pick</p>
                </div>
            </section>

        </section>
    </main>
    <script src=".../app.js"></script>
</body>

</html>
