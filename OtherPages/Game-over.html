<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game-over</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body class="gameoverbody">

    <main class="game-over-main" id="game-over">
        <h1>Game Over</h1>
        <h2>(--Reason why--)</h2>

        <section class="yes-no" id="yesNo">
            <h3>Do you want to use your extra life?</h3>
            <section class="extra-life-buttons">
                <div id="extra-life-yes-button">
                    <p>Yes</p>
                </div>

                <div id="extra-life-no-button">
                    <p>No</p>
                </div>
            </section>

            <section class="countdown-section">
                <progress id="countdown-line" max="100" value="70"></progress>
            </section>
        </section>

        <section class="retry-menu">
            <div id="retry">
                <p>Retry</p>
            </div>
            <div id="mainmenu">
                <p>Main Menu</p>
            </div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>

</html>
