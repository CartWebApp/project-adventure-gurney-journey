<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="body-page-combat">
    <nav class="All-pages-nav">
        <img draggable="false" src="/Images/Settings-icon.png" alt="Settings Icon">
        <img draggable="false" class="Volume" src="/Images/Volume.png" alt="Volume Icon">
    </nav>

    <main class="main-page-combat">
        <section class="rivals-people">
            <section class="ally-team">
                <section class="bars-combat-ally">
                    <section id="health" class="healthbar">
                        <img src="/Images/heart.png">
                        <progress max="100" id="health-progress"></progress>
                    </section>

                    <section id="hunger" class="hungerbar">
                        <img src="/Images/burger.png">
                        <progress max="100" id="hunger-progress"></progress>
                    </section>
                </section>
                <img draggable="false" src="/Images/Teddy-fighting.png" alt="Teddy Fighting Image">
            </section>

            <section class="enemy-team">
                <section class="bars-combat-enemy">
                    <section id="health-none" class="healthbar">
                        <img src="/Images/heart.png">
                        <progress max="100" id="health-progress"></progress>
                    </section>
                    <section id="health-bigEyes" class="healthbar">
                        <img src="/Images/heart.png">
                        <progress max="15" id="health-progress-bigEyes"></progress>
                    </section>
                </section>
                <img draggable="false" src="/Images/Creature-combat.png" alt="Creature Image">
            </section>
        </section>

        <section class="description-text-section-combat">
            <section>
                <p class="description-text" id="combat-text">Not complete (type here, do not change position and font)
                </p>
                <section class="link-text">
                    <section class="Go-back-button">
                        <h3 id="go-back">Go back &lt;</h3>
                    </section>
                    <section class="Continue-button">
                        <h3 id="continue">&gt; Continue </h3>
                    </section>
                </section>
            </section>
        </section>

        <section class="decisions-text">

            <section class="decision1-button" id="attack-button">
                <h3 id="Attack-combat">Attack</h3>
            </section>
            <section class="decision2-button" id="defend-button">
                <h3 id="Defend-combat">Defend</h3>
            </section>
            <section class="decision3-button" id="run-button">
                <h3 id="decision1">Run</h3>
            </section>
        </section>

        <section id="inventory">
            <div class="slot" id="slot1"></div>
            <div class="slot" id="slot2"></div>
            <div class="slot" id="slot3"></div>
            <div class="slot" id="slot4"></div>
        </section>
    </main>

    <button id="search">search (console test)</button>
    <script src="/app.js"></script>
</body>

</html>
